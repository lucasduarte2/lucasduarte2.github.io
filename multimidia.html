<!DOCTYPE html>
<html lang="pt-br">
	<head>
	<meta charset="utf-8">
		<title>Tudo sobre Google Glass</title>
		<link rel="stylesheet" type="text/css" href="css/estilo.css">
		<link rel="stylesheet" type="text/css" href="css/media.css">

	</head>
	<!--chamando o arquivo de JavaScript-->
	<script type="text/javascript" src="javascript/funcoes.js"></script>

	<body>
		<div id="interface">
		<!--"hgroup" serve para agrupar titulos que fazem parte de um mesmo grupo-->
			<header id="cabecalho">
				<hgroup>
					<!--titulo--><h1>Google Glass</h1>
					<!--sub-titulo--><h2>A revolução do Google está chegando</h2>
				</hgroup>
				<!--"src" é o caminho para a imagem-->
				<img id="icone" src="imagens/multimidia.png">
				<!--"nav" cria uma area de navegação no meu site, fazendo o menu ficar um do lado do outro-->
				<nav class="menu">
					<h1>Menu Principal</h1>
					<!--"ol" cria uma lista ordenada já "ul" cria uma lista n ordenada, logo n mostra a numeração-->
					<!--"type" pode ser 1, a, A, i, I q são os tipos de numeração possiveis, e "start" é a pocisão q eu quero q a numeração comece sendo sempre como um inteiro, em uma "ul" o "type" pode ser "square", "circle" ou "disc"-->
					<ul type="dics">
					<!--"li" é os itens da lista-->
						<!--onmouseover faz q quando eu passe o mause ele mude a imagem e onmouseout faz com q quando eu retire o mause ele volte para a imagem q eu quiser-->
						<li onmouseover="mudaFoto('home')" onmouseout="mudaFoto('multimidia')"><a href="index.html">Home</a></li>
					 	<li onmouseover="mudaFoto('especificacoes')" onmouseout="mudaFoto('multimidia')"><a href="specs.html">Especificações</a></li>
					 	<li onmouseover="mudaFoto('fotos')" onmouseout="mudaFoto('multimidia')"><a href="fotos.html">Fotos</a></li>
					 	<li onmouseover="mudaFoto('multimidia')" onmouseout="mudaFoto('multimidia')"><a href="multimidia.html">Multimídia</a></li>
					 		<!--eu possi criar uma lista dentro de uma lista, ex:
					 		<ul>
					 			<li> Musica </li>
					 			<li> video </li>
					 		</ul>
					 		isso cria uma lista em multimidia
					 		-->
					 	<li onmouseover="mudaFoto('contato')" onmouseout="mudaFoto('multimidia')"><a href="fale-conosco.html">Fale conosco</a></li>
					</ul>
				</nav>
				
		</header>
		<section id="corpo-full">
			<!--O Google e outros sistemas de busca não tem com saberem onde fica o bloco do texto principal do site. Não havia nenhuma indicação dizendo que determinado elemento é se trata do bloco que carrega a informação principal do site. O article surgiu para suprir essa necessidade.-->
			<article id="noticia-principal">
			<!--"header" é pra criar cabecalho-->
				<header id="cabecalho-artigo">
				    <!--Dentro dele é possível inserir um elemento hgroup que tem como função agrupar dois ou mais elementos h1 até ,h6 organizando-os em uma hierarquia de títulos e subtítulos.-->
					<hgroup>
					<!--"&nbsp;" serve para colocar um espaço-->
						<h3>Glass > Multimídia</h3>
						<h1>Sons e Vídeos</h1>
						<h2>por Lucas Duarte</h2>
						<h3 class="direita">Atualizado em 24/Janeiro/2017</h3>
					</hgroup>
				</header>
				<div id="tv-radio">
				<!--controls="controls" faz q pegue o play no navegador-->
					<audio id="musica" controls="controls">
					<!--origin do arquivo de audio-->
						<source src="media/2009-lovers-carvings-bibio.mp3" type="audio/mpeg"/>	
						Descupe, mas não foi possivel carregar o audio.
					</audio>
					<!--controls="controls" faz q pegue o play no navegador e poster faz q coloque uma imagem no video antes de roda-lo-->
					<video id="video" controls="controls" poster="imagens/video-mini03.jpg">
					<!--origin do arquivo de video-->
						<source src="media/getting-started.mp4" type="video/mp4">
						Descupe, mas não foi possivel carregar o video.
					</video>
				</div>
			</article>
		</section>
		<footer id="rodaPe">
			<p>Copyright &copy; 2013 - by Lucas Duarte <br/>
			<a href="https://www.facebook.com/" target="_blank">Facebook</a>
			</p>
		</footer>
			
		</div>

	</body>
</html>
